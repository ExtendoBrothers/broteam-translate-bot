name: Dependency Check

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > audit-report.json || true
          cat audit-report.json
        continue-on-error: true
      
      - name: Check for vulnerabilities
        run: |
          if [ -f audit-report.json ]; then
            HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json)
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)
            
            echo "High vulnerabilities: $HIGH"
            echo "Critical vulnerabilities: $CRITICAL"
            
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ Critical vulnerabilities found!"
              exit 1
            fi
            
            if [ "$HIGH" -gt 0 ]; then
              echo "⚠️ High vulnerabilities found"
            fi
          fi
      
      - name: Check outdated packages
        run: |
          npm outdated --json > outdated.json || true
          cat outdated.json
      
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            audit-report.json
            outdated.json
          retention-days: 30

  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    needs: dependency-audit
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: development
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Update dependencies
        run: |
          npm update
          npm audit fix || true
      
      - name: Run tests
        run: |
          npm ci
          npm test
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '🔄 Automated Dependency Updates'
          body: |
            This PR updates dependencies to their latest compatible versions.
            
            - Ran `npm update`
            - Ran `npm audit fix` for security patches
            - All tests passing
            
            Please review the changes and merge if everything looks good.
          branch: chore/dependency-updates
          base: development
          labels: dependencies, automated
