name: Dependency Hygiene

on:
  schedule:
    # Daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dependency-audit:
    name: Audit Production Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit (production dependencies)
        id: audit
        run: |
          npm audit --omit=dev --json > audit-report.json || true
          echo "critical=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)" >> $GITHUB_OUTPUT
          echo "high=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json)" >> $GITHUB_OUTPUT
          echo "moderate=$(jq '.metadata.vulnerabilities.moderate // 0' audit-report.json)" >> $GITHUB_OUTPUT
          echo "low=$(jq '.metadata.vulnerabilities.low // 0' audit-report.json)" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Summarize vulnerability counts
        run: |
          echo "Critical: ${{ steps.audit.outputs.critical }}"
          echo "High: ${{ steps.audit.outputs.high }}"
          echo "Moderate: ${{ steps.audit.outputs.moderate }}"
          echo "Low: ${{ steps.audit.outputs.low }}"

      - name: Create or update dependency security issue
        if: ${{ steps.audit.outputs.critical != '0' || steps.audit.outputs.high != '0' || steps.audit.outputs.moderate != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- dependency-hygiene-alert -->';
            const title = 'Dependency hygiene: production vulnerabilities detected';
            const body = `${marker}\n## Production Dependency Vulnerability Report\n\n- Critical: ${{ steps.audit.outputs.critical }}\n- High: ${{ steps.audit.outputs.high }}\n- Moderate: ${{ steps.audit.outputs.moderate }}\n- Low: ${{ steps.audit.outputs.low }}\n\nGenerated by workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,security'
            });

            const existing = issues.find(issue => issue.body && issue.body.includes(marker));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['dependencies', 'security']
              });
            }

      - name: Fail on high or critical production vulnerabilities
        if: ${{ steps.audit.outputs.critical != '0' || steps.audit.outputs.high != '0' }}
        run: |
          echo "❌ High or critical production vulnerabilities detected."
          exit 1
      
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: audit-report.json
          retention-days: 30
