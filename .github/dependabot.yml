version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: development
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 2
    groups:
      toolchain:
        dependency-type: development
        patterns:
          - "typescript"
          - "eslint"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "jest"
          - "ts-jest"
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
        exclude-patterns:
          - "typescript"
          - "eslint"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "jest"
          - "ts-jest"
